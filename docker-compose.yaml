services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PROJECT_ROOT: /app
      CHROMA_PATH: /app/chroma_db
      CHROMA_COLLECTION: nui_ba_den_rag
      AUTO_BUILD_CHROMA_ON_STARTUP: "true"
    volumes:
      - chroma_data:/app/chroma_db
      
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      - backend

volumes:
  chroma_data:
