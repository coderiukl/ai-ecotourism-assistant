services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PROJECT_ROOT: /app
      DATA_PATH: /app/no-local-data.xlsx
      IMAGES_DIR: /app/no-local-images
      CHROMA_PATH: /tmp/chroma_db
      CHROMA_COLLECTION: nui_ba_den_rag
    volumes:
      - chroma_data:/tmp/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chroma_data:
