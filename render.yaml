services:
  - type: web
    name: ai-ecotourism-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: ai-ecotourism-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        value: https://ai-ecotourism-backend.onrender.com
